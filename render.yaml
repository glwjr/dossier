services:
  - type: web
    name: dossier
    runtime: docker
    plan: starter
    healthCheckPath: /health
    # Runs once per deploy (not per instance), so migrations and the demo
    # template seed can't race if the web service is ever scaled past one node.
    preDeployCommand: "sh -c 'alembic upgrade head && python seed.py --demo'"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dossier-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false

databases:
  - name: dossier-db
    plan: basic-256mb
    databaseName: dossier
    user: dossier
