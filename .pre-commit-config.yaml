# Run `pre-commit install` once after cloning to enable these on every commit.
# Backend only — the frontend lint/typecheck/test run in CI (they need node_modules).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^ui/public/
      - id: trailing-whitespace
        exclude: ^ui/public/
      - id: check-yaml
      - id: check-added-large-files
