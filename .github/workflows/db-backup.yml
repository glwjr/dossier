name: DB Backup

# Off-site logical backup of the production database, on top of Render's own
# managed backups. Opt-in: no-ops unless the BACKUP_DATABASE_URL secret (Render's
# EXTERNAL connection string) is set. Artifacts contain user PII — keep the repo
# private and retention short.

on:
  schedule:
    - cron: "17 4 * * *" # daily, 04:17 UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump database
        env:
          # Render Dashboard → your Postgres → "External Database URL".
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          # pipefail so a pg_dump failure fails the step instead of silently
          # producing an empty gzip; -e/-u catch other errors.
          set -euo pipefail
          if [ -z "${BACKUP_DATABASE_URL:-}" ]; then
            echo "BACKUP_DATABASE_URL not set — skipping backup."
            exit 0
          fi
          ts=$(date -u +%Y%m%dT%H%M%SZ)
          file="dossier-${ts}.sql.gz"
          # pg_dump must be >= the server's major version. Run it from a pinned
          # Postgres image so it matches Render (bump the tag if Render upgrades).
          docker run --rm postgres:18 \
            pg_dump --no-owner --no-privileges "$BACKUP_DATABASE_URL" \
            | gzip > "$file"
          # Validate against a decompressed copy using plain file reads — not
          # early-exit pipes (grep -q / head), which send SIGPIPE back up the
          # pipeline and make pipefail misreport a valid dump as a failure.
          gzip -dc "$file" > dump.sql
          bytes=$(wc -c < dump.sql)
          if [ "$bytes" -lt 1000 ] || ! grep -q "PostgreSQL database dump" dump.sql; then
            echo "::error::Dump looks empty or invalid (${bytes} bytes) — refusing to upload."
            head -c 500 dump.sql || true
            exit 1
          fi
          rm -f dump.sql
          echo "Dump OK: $file (${bytes} uncompressed bytes)"
          echo "DUMP_FILE=$file" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        if: env.DUMP_FILE != ''
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.DUMP_FILE }}
          retention-days: 30
